name: bgp-antifilter

services:
  bird:
    image: "bgp-antifilter-bird:${BGP_ANTIFILTER_VERSION:-0.2.6}"
    build:
      context: .
      dockerfile: deploy/Dockerfile
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./deploy/bird.conf.template:/etc/bird/bird.conf.template:ro
      - ./generated:/etc/bird/generated
      - bird-run:/run/bird
    environment:
      MY_AS: "${MY_AS:-64500}"
      MT_AS: "${MT_AS:-65455}"
      MT_IP: "${MT_IP:-192.168.55.1}"
      BIRD_IP: "${BIRD_IP:-192.168.55.5}"
      ROUTER_ID: "${ROUTER_ID:-192.168.55.5}"
      BGP_COMMUNITY: "${BGP_COMMUNITY:-65432,500}"
      LISTS_FILE: /etc/bird/generated/config/lists.txt
      INCLUDE_ASNS_FILE: /etc/bird/generated/config/include-asns.txt
      INCLUDE_DOMAINS_FILE: /etc/bird/generated/config/include-domains.txt
      EXCLUDE_DOMAINS_FILE: /etc/bird/generated/config/exclude-domains.txt
      INCLUDE_GOOGLE_RANGES: "${INCLUDE_GOOGLE_RANGES:-1}"
      UPDATE_INTERVAL: "${UPDATE_INTERVAL:-1800}"
      CACHE_MAX_AGE: "${CACHE_MAX_AGE:-604800}"
      MIN_PREFIX_LENGTH: "${MIN_PREFIX_LENGTH:-8}"
      ALLOW_BROAD_ROUTES: "${ALLOW_BROAD_ROUTES:-0}"
      UPDATE_LOCK_DIR: "${UPDATE_LOCK_DIR:-/etc/bird/generated/update.lock}"
      HEALTHCHECK_REQUIRE_BGP: "${HEALTHCHECK_REQUIRE_BGP:-1}"
      HEALTHCHECK_FAIL_ON_DEGRADED: "${HEALTHCHECK_FAIL_ON_DEGRADED:-0}"
      BGP_PROTOCOL: "${BGP_PROTOCOL:-mikrotik}"
      ADMIN_ENABLED: "${ADMIN_ENABLED:-0}"
      ADMIN_PORT: "${ADMIN_PORT:-8080}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      RUNTIME_FILE: /etc/bird/generated/runtime.json
      CONTAINER_LOG_FILE: /etc/bird/generated/container.log
      SETTINGS_FILE: /etc/bird/generated/settings.json
      SETTINGS_ENV_FILE: /etc/bird/generated/settings.env

  admin:
    image: "bgp-antifilter-bird:${BGP_ANTIFILTER_VERSION:-0.2.6}"
    build:
      context: .
      dockerfile: deploy/Dockerfile
    restart: on-failure
    entrypoint: ["/usr/bin/tini", "--", "/admin-server.py"]
    ports:
      - "${ADMIN_PORT:-8080}:${ADMIN_PORT:-8080}"
    volumes:
      - ./generated:/etc/bird/generated
      - bird-run:/run/bird
    environment:
      MY_AS: "${MY_AS:-64500}"
      MT_AS: "${MT_AS:-65455}"
      MT_IP: "${MT_IP:-192.168.55.1}"
      BIRD_IP: "${BIRD_IP:-192.168.55.5}"
      ROUTER_ID: "${ROUTER_ID:-192.168.55.5}"
      BGP_COMMUNITY: "${BGP_COMMUNITY:-65432,500}"
      LISTS_FILE: /etc/bird/generated/config/lists.txt
      INCLUDE_ASNS_FILE: /etc/bird/generated/config/include-asns.txt
      INCLUDE_DOMAINS_FILE: /etc/bird/generated/config/include-domains.txt
      EXCLUDE_DOMAINS_FILE: /etc/bird/generated/config/exclude-domains.txt
      INCLUDE_GOOGLE_RANGES: "${INCLUDE_GOOGLE_RANGES:-1}"
      CACHE_MAX_AGE: "${CACHE_MAX_AGE:-604800}"
      MIN_PREFIX_LENGTH: "${MIN_PREFIX_LENGTH:-8}"
      ALLOW_BROAD_ROUTES: "${ALLOW_BROAD_ROUTES:-0}"
      UPDATE_LOCK_DIR: "${UPDATE_LOCK_DIR:-/etc/bird/generated/update.lock}"
      BGP_PROTOCOL: "${BGP_PROTOCOL:-mikrotik}"
      HEALTHCHECK_REQUIRE_BGP: "${HEALTHCHECK_REQUIRE_BGP:-1}"
      HEALTHCHECK_FAIL_ON_DEGRADED: "${HEALTHCHECK_FAIL_ON_DEGRADED:-0}"
      ADMIN_ENABLED: "${ADMIN_ENABLED:-0}"
      ADMIN_PORT: "${ADMIN_PORT:-8080}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      RUNTIME_FILE: /etc/bird/generated/runtime.json
      CONTAINER_LOG_FILE: /etc/bird/generated/container.log
      SETTINGS_FILE: /etc/bird/generated/settings.json
      SETTINGS_ENV_FILE: /etc/bird/generated/settings.env
    depends_on:
      - bird
    healthcheck:
      test: ["CMD-SHELL", "[ \"${ADMIN_ENABLED:-0}\" != \"1\" ] || curl -fsS \"http://127.0.0.1:${ADMIN_PORT:-8080}/api/session\" >/dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  bird-run:
