name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Tests and Docker checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Validate canonical Compose file
        run: docker compose --env-file .env.example config

      - name: Build canonical Docker image
        run: docker compose --env-file .env.example build

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck on canonical runtime scripts
        run: shellcheck deploy/entrypoint.sh deploy/healthcheck.sh deploy/reload-routes.sh
